<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bgGradient)"/>
  
  <!-- Navbar -->
  <rect width="1200" height="70" fill="#16213e" opacity="0.7"/>
  <circle cx="40" cy="35" r="20" fill="#00d4ff" opacity="0.8"/>
  <text x="70" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#00d4ff">MediWise</text>
  
  <!-- Title -->
  <text x="100" y="140" font-family="Arial" font-size="36" font-weight="bold" fill="#ffffff">
    My Medicine Cabinet
  </text>
  <text x="100" y="180" font-family="Arial" font-size="14" fill="#aaa">
    Securely manage and track your personal medications
  </text>
  
  <!-- Add Medicine Section -->
  <rect x="100" y="220" width="1000" height="70" rx="15" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="2"/>
  <input type="text" x="130" y="245" width="850" height="40" placeholder="Add new medicine..."/>
  <rect x="130" y="245" width="850" height="40" rx="8" fill="#0a0e27" opacity="0.8" stroke="#00d4ff" stroke-width="1"/>
  <text x="145" y="271" font-family="Arial" font-size="14" fill="#666">Add new medicine...</text>
  
  <rect x="1020" y="245" width="40" height="40" rx="8" fill="#00d4ff" opacity="0.8"/>
  <text x="1040" y="268" font-family="Arial" font-size="22" fill="#000" text-anchor="middle" font-weight="bold">+</text>
  
  <!-- Medicine List -->
  <text x="100" y="360" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">
    My Medicines (5)
  </text>
  
  <!-- Medicine Items -->
  <g id="med1">
    <rect x="100" y="380" width="450" height="100" rx="15" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="145" cy="430" r="25" fill="#00d4ff" opacity="0.2"/>
    <text x="145" y="440" font-family="Arial" font-size="24" text-anchor="middle" fill="#00d4ff">💊</text>
    <text x="190" y="410" font-family="Arial" font-size="15" font-weight="bold" fill="#ffffff">Metformin</text>
    <text x="190" y="430" font-family="Arial" font-size="12" fill="#aaa">1000mg • Daily</text>
    <text x="190" y="450" font-family="Arial" font-size="11" fill="#999">Added 2 days ago</text>
    <rect x="400" y="405" width="30" height="30" rx="5" fill="#ff6b6b" opacity="0.2"/>
    <text x="415" y="424" font-family="Arial" font-size="16" text-anchor="middle" fill="#ff6b6b">🗑</text>
  </g>
  
  <g id="med2">
    <rect x="650" y="380" width="450" height="100" rx="15" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="695" cy="430" r="25" fill="#00d4ff" opacity="0.2"/>
    <text x="695" y="440" font-family="Arial" font-size="24" text-anchor="middle" fill="#00d4ff">💊</text>
    <text x="740" y="410" font-family="Arial" font-size="15" font-weight="bold" fill="#ffffff">Lisinopril</text>
    <text x="740" y="430" font-family="Arial" font-size="12" fill="#aaa">10mg • Once daily</text>
    <text x="740" y="450" font-family="Arial" font-size="11" fill="#999">Added 5 days ago</text>
    <rect x="1050" y="405" width="30" height="30" rx="5" fill="#ff6b6b" opacity="0.2"/>
    <text x="1065" y="424" font-family="Arial" font-size="16" text-anchor="middle" fill="#ff6b6b">🗑</text>
  </g>
  
  <g id="med3">
    <rect x="100" y="510" width="450" height="100" rx="15" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="145" cy="560" r="25" fill="#00d4ff" opacity="0.2"/>
    <text x="145" y="570" font-family="Arial" font-size="24" text-anchor="middle" fill="#00d4ff">💊</text>
    <text x="190" y="540" font-family="Arial" font-size="15" font-weight="bold" fill="#ffffff">Aspirin</text>
    <text x="190" y="560" font-family="Arial" font-size="12" fill="#aaa">500mg • Twice daily</text>
    <text x="190" y="580" font-family="Arial" font-size="11" fill="#999">Added 1 week ago</text>
    <rect x="400" y="535" width="30" height="30" rx="5" fill="#ff6b6b" opacity="0.2"/>
    <text x="415" y="554" font-family="Arial" font-size="16" text-anchor="middle" fill="#ff6b6b">🗑</text>
  </g>
  
  <!-- Check Interactions Button -->
  <rect x="350" y="750" width="500" height="50" rx="10" fill="#00d4ff" opacity="0.8"/>
  <text x="600" y="783" font-family="Arial" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">Check Interactions for All Medicines</text>
</svg>
