<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="128" cy="128" r="120" fill="url(#logoGradient)" opacity="0.1" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Pill shape left half -->
  <path d="M 80 80 L 128 80 L 128 176 L 80 176 Q 60 176 60 156 L 60 100 Q 60 80 80 80 Z" fill="#00d4ff" opacity="0.9"/>
  
  <!-- Pill shape right half -->
  <path d="M 128 80 L 176 80 Q 196 80 196 100 L 196 156 Q 196 176 176 176 L 128 176 Z" fill="#0088ff" opacity="0.9"/>
  
  <!-- Center line (pill divider) -->
  <line x1="128" y1="85" x2="128" y2="171" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  
  <!-- Health cross inside pill -->
  <g transform="translate(128, 128)">
    <rect x="-8" y="-24" width="16" height="48" fill="#ffffff" rx="3" opacity="0.95"/>
    <rect x="-24" y="-8" width="48" height="16" fill="#ffffff" rx="3" opacity="0.95"/>
  </g>
  
  <!-- Glow effect -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
</svg>
