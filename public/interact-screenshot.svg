<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bgGradient)"/>
  
  <!-- Navbar -->
  <rect width="1200" height="70" fill="#16213e" opacity="0.7"/>
  <circle cx="40" cy="35" r="20" fill="#00d4ff" opacity="0.8"/>
  <text x="70" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#00d4ff">MediWise</text>
  
  <!-- Title -->
  <text x="100" y="140" font-family="Arial" font-size="36" font-weight="bold" fill="#ffffff">
    Drug Interaction Checker
  </text>
  <text x="100" y="180" font-family="Arial" font-size="14" fill="#aaa">
    Add medicines to check for potential dangerous interactions
  </text>
  
  <!-- Risk Indicator -->
  <rect x="100" y="220" width="350" height="250" rx="20" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="2"/>
  <text x="275" y="260" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Risk Level</text>
  
  <!-- Risk Dial -->
  <circle cx="275" cy="370" r="60" fill="none" stroke="#00d4ff" stroke-width="8" opacity="0.2"/>
  <path d="M 275 310 L 275 370 L 310 340 Z" fill="#4ade80" opacity="0.8"/>
  <text x="275" y="410" font-family="Arial" font-size="18" font-weight="bold" fill="#4ade80" text-anchor="middle">SAFE</text>
  
  <!-- Medicines Added -->
  <rect x="520" y="220" width="580" height="250" rx="20" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="2"/>
  <text x="810" y="260" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Medicines in Tray</text>
  
  <!-- Medicine Pills -->
  <g id="pill1">
    <rect x="540" y="290" width="150" height="50" rx="10" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="2"/>
    <text x="615" y="325" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Aspirin 500mg</text>
    <text x="675" y="323" font-family="Arial" font-size="16" fill="#ff6b6b">✕</text>
  </g>
  
  <g id="pill2">
    <rect x="720" y="290" width="150" height="50" rx="10" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="2"/>
    <text x="795" y="325" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Ibuprofen 200mg</text>
    <text x="855" y="323" font-family="Arial" font-size="16" fill="#ff6b6b">✕</text>
  </g>
  
  <g id="pill3">
    <rect x="900" y="290" width="120" height="50" rx="10" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="2"/>
    <text x="960" y="325" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Lisinopril 10mg</text>
    <text x="1005" y="323" font-family="Arial" font-size="16" fill="#ff6b6b">✕</text>
  </g>
  
  <!-- Interaction Results -->
  <text x="100" y="550" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">
    Interaction Analysis
  </text>
  
  <!-- Interaction Item -->
  <rect x="100" y="580" width="1000" height="80" rx="15" fill="#16213e" opacity="0.5" stroke="#4ade80" stroke-width="2"/>
  <circle cx="140" cy="620" r="15" fill="#4ade80" opacity="0.3"/>
  <text x="170" y="610" font-family="Arial" font-size="13" font-weight="bold" fill="#ffffff">Aspirin + Ibuprofen</text>
  <text x="170" y="630" font-family="Arial" font-size="12" fill="#aaa">No significant interaction detected</text>
  <text x="1000" y="625" font-family="Arial" font-size="16" text-anchor="end" fill="#4ade80" font-weight="bold">✓ SAFE</text>
</svg>
