<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bgGradient)"/>
  
  <!-- Navbar -->
  <rect width="1200" height="70" fill="#16213e" opacity="0.7"/>
  <circle cx="40" cy="35" r="20" fill="#00d4ff" opacity="0.8"/>
  <text x="70" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#00d4ff">MediWise</text>
  
  <!-- Title -->
  <text x="100" y="140" font-family="Arial" font-size="36" font-weight="bold" fill="#ffffff">
    Prescription Scanner
  </text>
  <text x="100" y="180" font-family="Arial" font-size="14" fill="#aaa">
    Upload an image of your prescription. Our AI will extract and analyze medicine names and dosages.
  </text>
  
  <!-- Upload Area -->
  <rect x="150" y="220" width="900" height="300" rx="20" fill="#16213e" opacity="0.4" stroke="#00d4ff" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- Upload Icon -->
  <circle cx="600" cy="330" r="50" fill="#00d4ff" opacity="0.2"/>
  <text x="600" y="350" font-family="Arial" font-size="60" fill="#00d4ff" text-anchor="middle">📤</text>
  
  <text x="600" y="420" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Click to upload or drag and drop
  </text>
  <text x="600" y="450" font-family="Arial" font-size="14" fill="#aaa" text-anchor="middle">
    PNG, JPG or GIF (max. 10MB)
  </text>
  
  <!-- Results Section -->
  <text x="100" y="600" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">
    Extracted Medicines
  </text>
  
  <!-- Medicine Items -->
  <g id="med1">
    <rect x="100" y="640" width="380" height="80" rx="15" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="135" cy="680" r="20" fill="#00d4ff" opacity="0.3"/>
    <text x="170" y="675" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">Aspirin</text>
    <text x="170" y="700" font-family="Arial" font-size="12" fill="#aaa">500mg • Twice daily</text>
    <rect x="330" y="660" width="40" height="40" rx="5" fill="#00d4ff" opacity="0.2"/>
    <text x="350" y="685" font-family="Arial" font-size="20" text-anchor="middle" fill="#00d4ff">✓</text>
  </g>
  
  <g id="med2">
    <rect x="520" y="640" width="380" height="80" rx="15" fill="#16213e" opacity="0.5" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="555" cy="680" r="20" fill="#00d4ff" opacity="0.3"/>
    <text x="590" y="675" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">Metformin</text>
    <text x="590" y="700" font-family="Arial" font-size="12" fill="#aaa">1000mg • Once daily</text>
    <rect x="750" y="660" width="40" height="40" rx="5" fill="#00d4ff" opacity="0.2"/>
    <text x="770" y="685" font-family="Arial" font-size="20" text-anchor="middle" fill="#00d4ff">✓</text>
  </g>
  
  <!-- Action Button -->
  <rect x="400" y="790" width="400" height="50" rx="10" fill="#00d4ff" opacity="0.8"/>
  <text x="600" y="823" font-family="Arial" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">Check Drug Interactions</text>
</svg>
